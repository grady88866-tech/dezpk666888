version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: dezpk
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7

  backend:
    image: ghcr.io/grady88866-tech/dezpk666888-backend:latest
    environment:
      - DATABASE_URL=postgres://dev:devpass@postgres:5432/dezpk
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"

  frontend:
    image: ghcr.io/grady88866-tech/dezpk666888-frontend:latest
    ports:
      - "8080:80"

volumes:
  pgdata:
