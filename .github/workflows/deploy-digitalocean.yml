name: Deploy to DigitalOcean

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy deployment script to droplet
        uses: appleboy/scp-action@v0.1.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          source: scripts/deploy_droplet.sh
          target: /tmp/deploy_droplet.sh

      - name: Run deployment on droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          script: |
            chmod +x /tmp/deploy_droplet.sh
            DOMAIN=${{ secrets.DROPLET_DOMAIN }} GHCR_USER=grady88866-tech GHCR_PAT=${{ secrets.GHCR_PAT }} /tmp/deploy_droplet.sh
